version: "3.8"

services:
  replica1:
    build: ./replica1
    container_name: replica1
    environment:
      REPLICA_ID: replica1
      REPLICA_PORT: 3001
      PEERS: http://replica2:3002,http://replica3:3003
    ports:
      - "3001:3001"
    volumes:
      - ./replica1:/app
      - /app/node_modules
    networks:
      - raft-network
    restart: unless-stopped

  replica2:
    build: ./replica2
    container_name: replica2
    environment:
      REPLICA_ID: replica2
      REPLICA_PORT: 3002
      PEERS: http://replica1:3001,http://replica3:3003
    ports:
      - "3002:3002"
    volumes:
      - ./replica2:/app
      - /app/node_modules
    networks:
      - raft-network
    restart: unless-stopped

  replica3:
    build: ./replica3
    container_name: replica3
    environment:
      REPLICA_ID: replica3
      REPLICA_PORT: 3003
      PEERS: http://replica1:3001,http://replica2:3002
    ports:
      - "3003:3003"
    volumes:
      - ./replica3:/app
      - /app/node_modules
    networks:
      - raft-network
    restart: unless-stopped

  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      GATEWAY_PORT: 4000
      REPLICAS: http://replica1:3001,http://replica2:3002,http://replica3:3003
    ports:
      - "4000:4000"
    depends_on:
      - replica1
      - replica2
      - replica3
    volumes:
      - ./gateway:/app
      - /app/node_modules
    networks:
      - raft-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:8080"
    depends_on:
      - gateway
    networks:
      - raft-network
    restart: unless-stopped

networks:
  raft-network:
    driver: bridge
